<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 940 791" style="max-width: 940px;">
  <defs>
    <linearGradient id="oursGrad-0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    <linearGradient id="oursGrad-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bar {
        transform-origin: bottom;
        animation: grow 1.0s ease-out both;
      }
      .bar-ours {
        transform-origin: bottom;
        animation: grow 1.0s ease-out 0.3s both;
        filter: url(#glow);
      }
      @keyframes grow {
        from { transform: scaleY(0); }
        to   { transform: scaleY(1); }
      }

      .label {
        opacity: 0;
        animation: fadeIn 0.5s ease-out 1.0s both;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .arrow-group {
        animation: pulse 2s ease-in-out 4.8s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }

      .arrow-path-0 {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: drawPath-0 0.80s ease-out 1.80s forwards;
      }
      @keyframes drawPath-0 {
        to { stroke-dashoffset: 0; }
      }
      .arrow-tip-0 {
        opacity: 0;
        animation: showTip-0 0.15s ease-out 2.48s forwards;
      }
      @keyframes showTip-0 {
        to { opacity: 1; }
      }
      .arrow-label-0 {
        opacity: 0;
        animation: revealLabel-0 0.50s ease-out 2.28s forwards;
      }
      @keyframes revealLabel-0 {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .arrow-path-1 {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: drawPath-1 0.80s ease-out 3.00s forwards;
      }
      @keyframes drawPath-1 {
        to { stroke-dashoffset: 0; }
      }
      .arrow-tip-1 {
        opacity: 0;
        animation: showTip-1 0.15s ease-out 3.68s forwards;
      }
      @keyframes showTip-1 {
        to { opacity: 1; }
      }
      .arrow-label-1 {
        opacity: 0;
        animation: revealLabel-1 0.50s ease-out 3.48s forwards;
      }
      @keyframes revealLabel-1 {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect width="940" height="791" rx="12" fill="#1a1a2e"/>

  <text x="470" y="30" text-anchor="middle"
        fill="white" font-size="25" font-weight="bold"
        font-family="monospace">WebArena MultiSite</text>

  <g transform="translate(0, 670)">
    <rect class="bar" x="40" y="-57" width="80" height="57" rx="4" fill="#4a4a6a"/>
    <rect class="bar" x="150" y="-246" width="80" height="246" rx="4" fill="#4a4a6a"/>
    <rect class="bar" x="260" y="-171" width="80" height="171" rx="4" fill="#4a4a6a"/>
    <rect class="bar-ours" x="430" y="-343" width="110" height="343" rx="4" fill="url(#oursGrad-0)" stroke="#FF6B6B" stroke-width="2"/>
    <rect class="bar" x="570" y="-243" width="80" height="243" rx="4" fill="#4a4a6a"/>
    <rect class="bar-ours" x="740" y="-500" width="110" height="500" rx="4" fill="url(#oursGrad-1)" stroke="#FFD700" stroke-width="2"/>
  </g>

  <g class="label">
    <text x="80" y="605" text-anchor="middle" fill="#aaa" font-size="14" font-family="monospace">8.3</text>
    <text x="190" y="416" text-anchor="middle" fill="#aaa" font-size="14" font-family="monospace">35.8</text>
    <text x="300" y="491" text-anchor="middle" fill="#aaa" font-size="14" font-family="monospace">25.0</text>
    <text x="485" y="319" text-anchor="middle" fill="#FF6B6B" font-size="20" font-weight="bold" font-family="monospace">50.0</text>
    <text x="610" y="419" text-anchor="middle" fill="#aaa" font-size="14" font-family="monospace">35.4</text>
    <text x="795" y="162" text-anchor="middle" fill="#FFD700" font-size="20" font-weight="bold" font-family="monospace">72.9</text>
    <text x="80" y="715" text-anchor="middle" transform="rotate(25, 80, 715)" fill="#888" font-size="13" font-family="monospace">WebArena*</text>
    <text x="190" y="715" text-anchor="middle" transform="rotate(25, 190, 715)" fill="#888" font-size="13" font-family="monospace">Branch and Browse</text>
    <text x="300" y="715" text-anchor="middle" transform="rotate(25, 300, 715)" fill="#888" font-size="13" font-family="monospace">AgentOccam*</text>
    <text x="485" y="715" text-anchor="middle" transform="rotate(25, 485, 715)" fill="#FF6B6B" font-size="13" font-weight="bold" font-family="monospace">★ WebNavigator GPT-4o (Ours)</text>
    <text x="610" y="715" text-anchor="middle" transform="rotate(25, 610, 715)" fill="#888" font-size="13" font-family="monospace">CUGA</text>
    <text x="795" y="715" text-anchor="middle" transform="rotate(25, 795, 715)" fill="#FFD700" font-size="13" font-weight="bold" font-family="monospace">★ WebNavigator Gemini-2.5-Pro (Ours)</text>
  </g>

  <g class="arrow-group">
    <path class="arrow-path-0"
          d="M 300 469 C 300 287, 396 306, 420 312"
          stroke="#FF6B6B" stroke-width="3" fill="none"/>
    <polygon class="arrow-tip-0" points="430.0,314.1 410.7,316.4 414.5,302.5" fill="#FF6B6B"/>
    <text class="arrow-label-0" x="360" y="281"
          text-anchor="middle"
          fill="#FF6B6B" font-size="32" font-weight="bold"
          font-family="monospace">↑ +100.0%</text>
  </g>
  <g class="arrow-group">
    <path class="arrow-path-1"
          d="M 610 397 C 610 130, 706 149, 730 155"
          stroke="#FFD700" stroke-width="6" fill="none"/>
    <polygon class="arrow-tip-1" points="745.0,160.0 710.8,164.1 717.4,139.4" fill="#FFD700"/>
    <text class="arrow-label-1" x="670" y="124"
          text-anchor="middle"
          fill="#FFD700" font-size="50" font-weight="bold"
          font-family="monospace">↑ +105.9%</text>
  </g>
</svg>
