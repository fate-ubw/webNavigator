<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 600 300" style="max-width: 600px;">
  <defs>
    
    <linearGradient id="oursGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      .bar {
        transform-origin: bottom;
        animation: grow 1s ease-out both;
      }
      .bar-ours {
        transform-origin: bottom;
        animation: grow 1s ease-out 0.3s both;
        filter: url(#glow);
      }
      @keyframes grow {
        from { transform: scaleY(0); }
        to   { transform: scaleY(1); }
      }
      .label {
        opacity: 0;
        animation: fadeIn 0.5s ease-out 1s both;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      /* 箭头闪烁 */
      .arrow-text {
        animation: pulse 1.5s ease-in-out 1.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }
    </style>
  </defs>
  
  <rect width="600" height="300" rx="12" fill="#1a1a2e"/>
  
  <text x="300" y="30" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="monospace">Benchmark Results</text>
  
  
  <g transform="translate(0, 260)">
    <rect class="bar" x="60" y="-120" width="60" height="120" rx="4" fill="#4a4a6a"/>
    <rect class="bar" x="160" y="-140" width="60" height="140" rx="4" fill="#4a4a6a"/>
    <rect class="bar" x="260" y="-155" width="60" height="155" rx="4" fill="#4a4a6a"/>
    
    <rect class="bar-ours" x="380" y="-200" width="80" height="200" rx="4" fill="url(#oursGrad)" stroke="#FF6B6B" stroke-width="2"/>
  </g>
  
  <g class="label">
    <text x="90" y="128" text-anchor="middle" fill="#aaa" font-size="12" font-family="monospace">82.1%</text>
    <text x="190" y="108" text-anchor="middle" fill="#aaa" font-size="12" font-family="monospace">84.3%</text>
    <text x="290" y="93" text-anchor="middle" fill="#aaa" font-size="12" font-family="monospace">85.7%</text>
    <text x="420" y="48" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="monospace">88.9%</text>
    
    <text x="90" y="280" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">Baseline</text>
    <text x="190" y="280" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">Method A</text>
    <text x="290" y="280" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">Method B</text>
    <text x="420" y="280" text-anchor="middle" fill="#FF6B6B" font-size="13" font-weight="bold" font-family="monospace">★ Ours</text>
  </g>
  
  <g class="arrow-text">
    <path d="M 310 80 Q 350 60 375 58" stroke="#FF6B6B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="290" y="75" fill="#FF6B6B" font-size="14" font-weight="bold" font-family="monospace">↑ +3.2%</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B6B"/>
    </marker>
  </defs>
</svg>